<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitionIQ - Enterprise Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="text-slate-800 antialiased h-screen flex overflow-hidden bg-[#FAFAFA]">

    <!-- Mobile Header (Visible only on small screens) -->
    <div class="md:hidden fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 z-30 flex items-center justify-between px-4">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-indigo-600 rounded-md flex items-center justify-center shadow-sm">
                <i data-lucide="hexagon" class="text-white w-4 h-4"></i>
            </div>
            <span class="font-bold text-slate-900 tracking-tight">TransitionIQ</span>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden md:hidden transition-opacity opacity-0 backdrop-blur-sm"></div>

    <!-- Sidebar / Navigation -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-64 bg-white border-r border-slate-200 flex flex-col h-full z-50 shrink-0 transition-transform duration-300 ease-in-out">
        <div class="h-16 hidden md:flex items-center px-6 border-b border-slate-100">
            <div class="w-7 h-7 bg-indigo-600 rounded-md flex items-center justify-center mr-3 shadow-sm">
                <i data-lucide="hexagon" class="text-white w-4 h-4"></i>
            </div>
            <span class="font-bold text-slate-900 tracking-tight">TransitionIQ</span>
        </div>

        <!-- Mobile Sidebar Header with Close Button -->
        <div class="h-16 md:hidden flex items-center justify-between px-4 border-b border-slate-100 bg-white">
            <span class="font-bold text-slate-900 tracking-tight">Menu</span>
            <button id="close-menu-btn" class="p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="nav-items">
            <button onclick="setTabAndCloseMenu('dashboard')" class="nav-btn active" data-tab="dashboard">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </button>
            <button onclick="setTabAndCloseMenu('employees')" class="nav-btn inactive" data-tab="employees">
                <i data-lucide="users" class="w-4 h-4"></i> Employees
            </button>
            <button onclick="setTabAndCloseMenu('transitions')" class="nav-btn inactive" data-tab="transitions">
                <i data-lucide="arrow-right-left" class="w-4 h-4"></i> Transitions
            </button>
            <button onclick="setTabAndCloseMenu('tasks')" class="nav-btn inactive" data-tab="tasks">
                <i data-lucide="check-square" class="w-4 h-4"></i> Tasks
            </button>
            <button onclick="setTabAndCloseMenu('knowledge')" class="nav-btn inactive" data-tab="knowledge">
                <i data-lucide="brain-circuit" class="w-4 h-4"></i> Knowledge Capture
            </button>
            <button onclick="setTabAndCloseMenu('licenses')" class="nav-btn inactive" data-tab="licenses">
                <i data-lucide="key" class="w-4 h-4"></i> Licenses
            </button>

            <div class="pt-4 pb-1">
                <p class="px-3 text-[10px] font-bold uppercase tracking-wider text-slate-400">Core Modules</p>
            </div>

            <button onclick="setTabAndCloseMenu('logistics')" class="nav-btn inactive" data-tab="logistics">
                <i data-lucide="truck" class="w-4 h-4"></i> Hardware Logistics
            </button>
            <button onclick="setTabAndCloseMenu('audit')" class="nav-btn inactive" data-tab="audit">
                <i data-lucide="activity" class="w-4 h-4"></i> Audit Log
            </button>
            <button onclick="setTabAndCloseMenu('documentation')" class="nav-btn inactive" data-tab="documentation">
                <i data-lucide="book" class="w-4 h-4"></i> Documentation
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100 hidden md:block">
            <div class="bg-indigo-50 rounded-lg p-4 border border-indigo-100/50">
                <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-1">Active Transitions</p>
                <p class="text-2xl font-black text-slate-900 mb-1" id="sidebar-active-count">-</p>
                <p class="text-xs text-slate-500">2 offboarding · 1 onboarding</p>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden w-full pt-16 md:pt-0">

        <!-- Desktop Header -->
        <header class="hidden md:flex h-16 bg-white border-b border-slate-200 items-center justify-between px-8 shrink-0">
            <div class="search-container">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
                <input type="text" placeholder="Search employees, tasks..." class="search-input">
            </div>

            <div class="flex items-center gap-4">
                <button class="text-slate-400 hover:text-slate-600 relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="notification-dot"></span>
                </button>
                <div class="user-avatar">NP</div>
            </div>
        </header>

        <!-- Content scroll area -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8" id="content-area">
        </div>
    </main>

    <!-- Mobile Menu Script -->
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-menu-overlay');

        function toggleMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');

            if (isClosed) {
                // Open menu
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                document.body.classList.add('overflow-hidden'); // Prevent background scrolling
            } else {
                // Close menu
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.classList.remove('overflow-hidden');
            }
        }

        mobileMenuBtn.addEventListener('click', toggleMenu);
        closeMenuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // This function will be called from app.js when a nav button is clicked
        window.setTabAndCloseMenu = function(tab) {
            window.setTab(tab); // Call the main app.js setTab function

            // If on mobile (sidebar has transform class), close the menu after selection
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleMenu();
            }
        };
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
