<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitionIQ - Enterprise Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="text-slate-800 antialiased h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full z-20 shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <div class="w-7 h-7 bg-indigo-600 rounded-md flex items-center justify-center mr-3 shadow-sm">
                <i data-lucide="hexagon" class="text-white w-4 h-4"></i>
            </div>
            <span class="font-bold text-slate-900 tracking-tight">TransitionIQ</span>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="nav-items">
            <button onclick="setTab('dashboard')" class="nav-btn active" data-tab="dashboard">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </button>
            <button onclick="setTab('employees')" class="nav-btn inactive" data-tab="employees">
                <i data-lucide="users" class="w-4 h-4"></i> Employees
            </button>
            <button onclick="setTab('transitions')" class="nav-btn inactive" data-tab="transitions">
                <i data-lucide="arrow-right-left" class="w-4 h-4"></i> Transitions
            </button>
            <button onclick="setTab('tasks')" class="nav-btn inactive" data-tab="tasks">
                <i data-lucide="check-square" class="w-4 h-4"></i> Tasks
            </button>
            <button onclick="setTab('knowledge')" class="nav-btn inactive" data-tab="knowledge">
                <i data-lucide="brain-circuit" class="w-4 h-4"></i> Knowledge Capture
            </button>
            <button onclick="setTab('licenses')" class="nav-btn inactive" data-tab="licenses">
                <i data-lucide="key" class="w-4 h-4"></i> Licenses
            </button>

            <div class="pt-4 pb-1">
                <p class="px-3 text-[10px] font-bold uppercase tracking-wider text-slate-400">Core Modules</p>
            </div>

            <button onclick="setTab('logistics')" class="nav-btn inactive" data-tab="logistics">
                <i data-lucide="truck" class="w-4 h-4"></i> Hardware Logistics
            </button>
            <button onclick="setTab('playbook')" class="nav-btn inactive" data-tab="playbook">
                <i data-lucide="book-open" class="w-4 h-4"></i> Manager Playbook
            </button>
            <button onclick="setTab('audit')" class="nav-btn inactive" data-tab="audit">
                <i data-lucide="activity" class="w-4 h-4"></i> Audit Log
            </button>
            <button onclick="setTab('documentation')" class="nav-btn inactive" data-tab="documentation">
                <i data-lucide="book" class="w-4 h-4"></i> Documentation
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="bg-indigo-50 rounded-lg p-4 border border-indigo-100/50">
                <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-1">Active Transitions</p>
                <p class="text-2xl font-black text-slate-900 mb-1">3</p>
                <p class="text-xs text-slate-500">2 offboarding · 1 onboarding</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-[#FAFAFA]">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <div class="search-container">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
                <input type="text" placeholder="Search employees, tasks..." class="search-input">
            </div>

            <div class="flex items-center gap-4">
                <button class="text-slate-400 hover:text-slate-600 relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="notification-dot"></span>
                </button>
                <div class="user-avatar">NP</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8" id="content-area">
            </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
